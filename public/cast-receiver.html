<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fitdog Cast Receiver</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #02060b;
        color: #fff;
        font-family: system-ui, sans-serif;
      }

      .status {
        display: grid;
        place-items: center;
        height: 100%;
        text-align: center;
        padding: 2rem;
        font-size: 1.25rem;
        line-height: 1.5;
      }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div class="status" id="status">Connecting Fitdog digital whiteboard...</div>
    <script>
      const CAST_NAMESPACE = "urn:x-cast:com.fitdog.lobby";
      const statusEl = document.getElementById("status");
      const context = cast.framework.CastReceiverContext.getInstance();
      let pendingUrl = "";
      let navigating = false;

      function preconnectToBoard(url) {
        try {
          const target = new URL(url);
          const link = document.createElement("link");
          link.rel = "preconnect";
          link.href = target.origin;
          document.head.appendChild(link);
        } catch (error) {
          // Ignore malformed URLs.
        }
      }

      function navigateToBoard(url) {
        if (!url || typeof url !== "string" || navigating) return;
        navigating = true;
        pendingUrl = url;
        preconnectToBoard(url);
        window.location.replace(url);
      }

      function parseCastPayload(data) {
        if (!data) return null;
        if (typeof data === "string") {
          try {
            return JSON.parse(data);
          } catch (error) {
            return { url: data };
          }
        }
        return data;
      }

      context.addCustomMessageListener(CAST_NAMESPACE, (event) => {
        const payload = parseCastPayload(event.data);
        if (payload?.action === "reload") {
          if (payload.url) {
            navigateToBoard(payload.url);
            return;
          }
          window.location.reload();
          return;
        }
        navigateToBoard(payload && payload.url);
      });

      context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
        if (pendingUrl) {
          navigateToBoard(pendingUrl);
        }
      });

      context.start({ disableIdleTimeout: true });
    </script>
  </body>
</html>
