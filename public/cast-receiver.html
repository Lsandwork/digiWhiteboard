<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fitdog Lobby Cast Receiver</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #02060b;
        color: #fff;
        font-family: system-ui, sans-serif;
      }

      .status {
        display: grid;
        place-items: center;
        height: 100%;
        text-align: center;
        padding: 2rem;
      }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div class="status" id="status">Connecting Fitdog lobby board...</div>
    <script>
      const LOBBY_NAMESPACE = "urn:x-cast:com.fitdog.lobby";
      const statusEl = document.getElementById("status");
      const context = cast.framework.CastReceiverContext.getInstance();

      function navigateToLobby(url) {
        if (!url || typeof url !== "string") return;
        statusEl.textContent = "Opening lobby board...";
        window.location.replace(url);
      }

      context.addCustomMessageListener(LOBBY_NAMESPACE, (event) => {
        try {
          const data = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
          navigateToLobby(data && data.url);
        } catch (error) {
          statusEl.textContent = "Unable to open lobby board.";
        }
      });

      context.start({ disableIdleTimeout: true });
    </script>
  </body>
</html>
